<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Comfortaa:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
  body{font-family:'Comfortaa',sans-serif;color:#1f1f1f;background:#8b8bea}
  img{display:block;max-width:100%}
  a{text-decoration:none;color:inherit}
  input::placeholder,textarea::placeholder{color:#9a9ab2}
  @keyframes fdFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
  @media(max-width:760px){ [data-cgrid]{grid-template-columns:1fr!important} }
  @media(max-width:480px){ [data-namerow]{grid-template-columns:1fr!important} }
  @media(max-width:600px){
    [data-sec]{padding-left:18px!important;padding-right:18px!important}
    [data-nav]{padding-left:18px!important;padding-right:18px!important}
  }
</style>
</helmet>

<div style="background:#8b8bea;overflow-x:hidden;min-height:100vh;display:flex;flex-direction:column">

  <nav data-nav style="position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;gap:16px;padding:12px 40px;background:#d9d9d9;box-shadow:0 2px 14px rgba(40,40,80,.08)">
    <a href="index.dc.html" style="display:flex;align-items:center">
      <img src="assets/logo-freedom.jpg" alt="Freedom" style="height:46px;width:auto">
    </a>
    <div style="display:flex;gap:12px">
      <a href="merch.dc.html" style="background:#a9a9ef;padding:10px 26px;border-radius:14px;font-size:15px;color:#33335f;transition:transform .15s,filter .15s" style-hover="filter:brightness(1.06);transform:translateY(-1px)">мерч</a>
      <a href="contacts.dc.html" style="background:#8cc88c;padding:10px 26px;border-radius:14px;font-size:15px;color:#244024;font-weight:600;transition:transform .15s,filter .15s" style-hover="filter:brightness(1.06);transform:translateY(-1px)">поддержка</a>
    </div>
  </nav>

  <section data-sec style="flex:1;padding:56px 40px 72px">
    <div style="max-width:920px;margin:0 auto">
      <h1 style="text-align:center;font-weight:700;font-size:clamp(28px,3.4vw,40px);color:#1d1d3a;margin-bottom:6px">Поддержка</h1>
      <p style="text-align:center;font-family:'Caveat',cursive;font-size:24px;color:#e7e7ef;margin-bottom:42px">мы всегда на связи</p>

      <div data-cgrid style="display:grid;grid-template-columns:.85fr 1.15fr;gap:28px;align-items:start">

        <div data-reveal style="background:#e7e7ef;border-radius:24px;padding:32px 28px">
          <h2 style="font-size:22px;margin-bottom:24px;color:#1d1d3a">Наши контакты</h2>
          <div style="background:#fff;border-radius:16px;padding:18px 20px;margin-bottom:14px">
            <div style="font-size:13px;color:#7a7a96;margin-bottom:4px">Менеджер</div>
            <div style="font-weight:700;font-size:18px;color:#1d1d3a">+7 999 999 99 99</div>
          </div>
          <div style="background:#fff;border-radius:16px;padding:18px 20px;margin-bottom:14px">
            <div style="font-size:13px;color:#7a7a96;margin-bottom:4px">Почта</div>
            <div style="font-weight:700;font-size:17px;color:#1d1d3a">hello@freedom.ru</div>
          </div>
          <div style="background:#8cc88c;border-radius:16px;padding:18px 20px">
            <div style="font-size:13px;color:#24482a;margin-bottom:4px">Время работы</div>
            <div style="font-weight:700;font-size:17px;color:#1f3a1f">Ежедневно 9:00 – 21:00</div>
          </div>
        </div>

        <div data-reveal style="background:#e7e7ef;border-radius:24px;padding:32px 30px">
          <h2 style="font-size:22px;margin-bottom:24px;color:#1d1d3a">Заполните заявку</h2>
          <form onsubmit="{{ onSubmit }}">
            <div data-namerow style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
              <input type="text" placeholder="Имя" required="required" style="background:#fff;border:2px solid transparent;border-radius:14px;padding:14px 18px;width:100%;font-family:'Comfortaa',sans-serif;font-size:15px;color:#1d1d3a;outline:none;transition:border-color .15s" style-focus="border-color:#8cc88c">
              <input type="text" placeholder="Фамилия" required="required" style="background:#fff;border:2px solid transparent;border-radius:14px;padding:14px 18px;width:100%;font-family:'Comfortaa',sans-serif;font-size:15px;color:#1d1d3a;outline:none;transition:border-color .15s" style-focus="border-color:#8cc88c">
            </div>
            <input type="tel" placeholder="Телефон" required="required" style="background:#fff;border:2px solid transparent;border-radius:14px;padding:14px 18px;width:100%;margin-top:14px;font-family:'Comfortaa',sans-serif;font-size:15px;color:#1d1d3a;outline:none;transition:border-color .15s" style-focus="border-color:#8cc88c">
            <textarea placeholder="Что случилось?" style="background:#fff;border:2px solid transparent;border-radius:14px;padding:14px 18px;width:100%;margin-top:14px;min-height:140px;resize:vertical;font-family:'Comfortaa',sans-serif;font-size:15px;color:#1d1d3a;outline:none;transition:border-color .15s" style-focus="border-color:#8cc88c"></textarea>
            <button type="submit" style="margin-top:18px;background:#f5a623;color:#1f1f1f;font-weight:700;border:none;cursor:pointer;font-family:'Comfortaa',sans-serif;font-size:16px;padding:15px 38px;border-radius:16px;box-shadow:0 8px 20px rgba(245,166,35,.3);transition:transform .15s,filter .15s" style-hover="transform:translateY(-2px);filter:brightness(1.04)">Отправить</button>
          </form>
        </div>

      </div>
    </div>
  </section>

  <footer style="background:#8b8bea;padding:36px 40px 46px">
    <div style="max-width:1180px;margin:0 auto;display:flex;align-items:center;gap:18px">
      <img src="assets/logo-badge.jpg" alt="F" style="width:70px;height:70px;border-radius:50%;box-shadow:0 10px 24px rgba(40,40,80,.18);animation:fdFloat 4.5s ease-in-out infinite">
      <div style="font-family:'Caveat',cursive;font-size:28px;color:#3f8f49;font-weight:700">Freedom</div>
    </div>
  </footer>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals(){
    return {
      onSubmit: (e)=>{ e.preventDefault(); alert('Заявка отправлена!'); e.target.reset && e.target.reset(); }
    };
  }
  componentDidMount(){
    const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if(reduce || !('IntersectionObserver' in window)) return;
    const obs = new IntersectionObserver((entries)=>{
      entries.forEach(e=>{ if(e.isIntersecting){ e.target.style.opacity='1'; e.target.style.transform='none'; obs.unobserve(e.target);} });
    },{threshold:0.12});
    requestAnimationFrame(()=>{
      Array.from(document.querySelectorAll('[data-reveal]')).forEach((el,i)=>{
        const r = el.getBoundingClientRect();
        if(r.top < window.innerHeight*0.92) return;
        el.style.opacity='0';
        el.style.transform='translateY(24px)';
        el.style.transition='opacity .6s ease '+(i*0.07)+'s, transform .6s ease '+(i*0.07)+'s';
        obs.observe(el);
      });
    });
  }
}
</script>
</body>
</html>
