<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Freedom — Поддержка</title>
<link rel="stylesheet" href="style.css">
<style>
  .contact-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 50px;
    max-width: 820px;
    margin: 40px auto;
  }
  .card {
    background: var(--grey-light);
    border-radius: 22px;
    padding: 30px;
  }
  .card h2 { text-align: center; margin-bottom: 26px; font-size: 24px; }
  .manager {
    background: var(--grey);
    border-radius: 14px;
    padding: 16px 20px;
    font-weight: 600;
  }
  .field {
    background: var(--white);
    border: none;
    border-radius: 14px;
    padding: 14px 18px;
    width: 100%;
    margin-bottom: 16px;
    font-family: 'Comfortaa', sans-serif;
    font-size: 15px;
  }
  textarea.field { resize: vertical; min-height: 130px; }
  .send-btn { padding: 11px 30px; font-size: 16px; }
  @media (max-width: 720px){ .contact-grid{grid-template-columns:1fr} }
</style>
</head>
<body>

<nav class="nav">
  <a href="index.html" class="logo"><span class="balloon">F</span>reedom</a>
  <div class="nav-links">
    <a href="merch.html">мерч</a>
    <a href="contacts.html">поддержка</a>
  </div>
</nav>

<section class="bg-purple">
  <div class="contact-grid">

    <div class="card">
      <h2>Наши контакты:</h2>
      <div class="manager">Менеджер: +7.999.999.99.99</div>
    </div>

    <div class="card">
      <h2>Заполните заявку</h2>
      <form onsubmit="event.preventDefault(); alert('Заявка отправлена!');">
        <input class="field" type="text" placeholder="Имя:" required>
        <input class="field" type="text" placeholder="Фамилия:" required>
        <input class="field" type="tel" placeholder="Телефон:" required>
        <textarea class="field" placeholder="Что случилось?"></textarea>
        <button type="submit" class="btn btn-orange send-btn">Отправить</button>
      </form>
    </div>

  </div>
</section>

<footer class="footer-balloon bg-purple">
  <div class="big-f">F</div>
</footer>

</body>
</html>
