<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Freedom — Мерч</title>
<link rel="stylesheet" href="./css/style.css">
<style>
  .merch-title {
    text-align: center;
    margin: 30px auto 10px;
    background: var(--grey-light);
    width: max-content;
    padding: 8px 40px;
    border-radius: 16px;
    font-family: 'Caveat', cursive;
    font-size: 30px;
  }
  .merch-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 50px 60px;
    max-width: 760px;
    margin: 40px auto;
  }
  .product { text-align: center; }
  .product-img {
    height: 190px;
    border-radius: 14px;
    background: var(--white);
    display: grid;
    place-items: center;
    font-size: 80px;
    margin-bottom: 16px;
    box-shadow: 0 4px 10px rgba(0,0,0,.08);
  }
  .product-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 10px;
  }
  .product-name { font-weight: 700; font-size: 18px; }
  .product-price {
    background: var(--purple-light);
    padding: 7px 22px;
    border-radius: 12px;
    font-size: 14px;
  }
  .buy-btn { width: 100%; max-width: 300px; padding: 11px; font-size: 16px; }
  @media (max-width: 700px){ .merch-grid{grid-template-columns:1fr} }
</style>
</head>
<body>

<nav class="nav">
  <a href="index.html" class="logo"><span class="balloon">F</span>reedom</a>
  <div class="nav-links">
    <a href="merch.html">мерч</a>
    <a href="contacts.html">поддержка</a>
  </div>
</nav>

<div class="merch-title">Мерч</div>

<section class="bg-purple" style="padding-bottom:40px">
  <div class="merch-grid">

    <div class="product">
      <div class="product-img">📓</div>
      <div class="product-row">
        <span class="product-name">Тетрадь</span>
        <span class="product-price">500руб</span>
      </div>
      <a href="404.html" class="btn btn-orange buy-btn">Купить</a>
    </div>

    <div class="product">
      <div class="product-img">☕</div>
      <div class="product-row">
        <span class="product-name">Кружка</span>
        <span class="product-price">500руб</span>
      </div>
      <a href="404.html" class="btn btn-orange buy-btn">Купить</a>
    </div>

    <div class="product">
      <div class="product-img">👕</div>
      <div class="product-row">
        <span class="product-name">Футболка</span>
        <span class="product-price">500руб</span>
      </div>
      <a href="404.html" class="btn btn-orange buy-btn">Купить</a>
    </div>

    <div class="product">
      <div class="product-img">🧥</div>
      <div class="product-row">
        <span class="product-name">Худи</span>
        <span class="product-price">500руб</span>
      </div>
      <a href="404.html" class="btn btn-orange buy-btn">Купить</a>
    </div>

  </div>
</section>

<footer class="footer-balloon bg-purple">
  <div class="big-f">F</div>
</footer>

</body>
</html>
